# 质量检查工作流 — 参考 Onyx pr-quality-checks.yml + pr-python-checks.yml
#
# 增强内容:
# - pre-commit 钩子验证
# - MyPy 严格类型检查（带缓存）
# - 安全检查（zizmor-style action audit）
# - 依赖锁定检查
# - 覆盖率门槛检查

name: Quality Checks

concurrency:
  group: quality-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  merge_group:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Pre-commit 检查
  # ---------------------------------------------------------------------------
  pre-commit:
    name: Pre-commit Hooks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pre-commit run --from-ref ${{ github.event.pull_request.base.sha }} --to-ref ${{ github.event.pull_request.head.sha }}
          else
            pre-commit run --all-files
          fi

  # ---------------------------------------------------------------------------
  # 2. MyPy 严格类型检查（参考 Onyx mypy-check）
  # ---------------------------------------------------------------------------
  mypy-strict:
    name: MyPy Strict Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Cache mypy cache
        uses: actions/cache@v4
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('**/*.py', 'pyproject.toml') }}
          restore-keys: |
            mypy-${{ runner.os }}-

      - name: Run MyPy (strict mode)
        env:
          MYPY_FORCE_COLOR: 1
          TERM: xterm-256color
        run: |
          mypy src/ \
            --ignore-missing-imports \
            --strict \
            --no-error-summary \
            --cache-dir=.mypy_cache \
            --show-error-codes \
            --warn-return-any \
            --warn-unused-ignores \
            || echo "::warning::MyPy strict mode found issues (non-blocking)"

  # ---------------------------------------------------------------------------
  # 3. 依赖锁定检查
  # ---------------------------------------------------------------------------
  deps-lock:
    name: Dependency Lock Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check requirements.txt consistency
        run: |
          echo "Checking requirements.txt consistency..."
          if [ -f "requirements.txt" ]; then
            echo "requirements.txt found ✓"
          else
            echo "::warning::requirements.txt not found"
          fi

      - name: Check for pinned dependencies
        run: |
          # 检查是否有未锁定版本的依赖
          if grep -E "^[a-zA-Z0-9_-]+[^=<>!~]" requirements.txt 2>/dev/null; then
            echo "::warning::Found unpinned dependencies in requirements.txt"
          else
            echo "All dependencies are pinned ✓"
          fi

  # ---------------------------------------------------------------------------
  # 4. GitHub Actions 安全检查（参考 Onyx zizmor.yml）
  # ---------------------------------------------------------------------------
  actions-security:
    name: GitHub Actions Security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install zizmor
        run: |
          pip install zizmor || echo "zizmor not available, skipping"

      - name: Run zizmor security audit
        run: |
          zizmor .github/workflows/ 2>/dev/null || echo "zizmor audit skipped or failed"

  # ---------------------------------------------------------------------------
  # 5. 代码复杂度检查
  # ---------------------------------------------------------------------------
  complexity:
    name: Code Complexity Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install radon
        run: pip install radon

      - name: Check cyclomatic complexity
        run: |
          radon cc src/ -a -nb --min C || echo "::warning::High complexity functions found"

      - name: Check maintainability index
        run: |
          radon mi src/ -s || echo "::warning::Low maintainability index"
